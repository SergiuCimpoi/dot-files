[cmp]
border   = { fg = "#b4befe" }

[tasks]
border   = { fg = "#b4befe" }
title    = {}
hovered  = { underline = true }

[which]
mask            = { bg = "#313244" }
cand            = { fg = "#94e2d5" }
rest            = { fg = "#9399b2" }
desc            = { fg = "#f5c2e7" }
